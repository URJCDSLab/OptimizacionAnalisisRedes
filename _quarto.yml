project:
  type: book
  output-dir: docs

book:
  title: "Apuntes de Optimización y Análisis de Redes"
  author: 
    - "Víctor Aceña Gil"
    - "Antonio Alonso Ayuso"
  date: last-modified
  search: true
  cover-image: images/DSLab_logo_2.png
  chapters:
    - index.qmd
    - tema1.qmd
    - tema2.qmd
    - tema3.qmd
    - tema4.qmd
    - tema5.qmd
    - tema6.qmd
    - tema7.qmd
    - tema8.qmd
    - tema9.qmd
    - tema10.qmd
    - tema11.qmd
    - conclusiones.qmd
    - references.qmd

bibliography: References.bib
lang: es

format:
  html:
    theme: cerulean
    toc: true
    toc-depth: 3
    number-sections: true
    css: estilos_html.css
    lightbox: true
  pdf:
    documentclass: scrreprt
    title-block-banner: false 
    toc: true
    toc-depth: 3
    toc-title: "Índice apuntes"
    number-sections: true
    keep-tex: false
    include-in-header:
      text: |
        \usepackage{xcolor}
        \usepackage{tcolorbox}
        \tcbuselibrary{skins, breakable}
        \usepackage{framed}
        
        % Entorno para prácticas en LaTeX
        \definecolor{practicabg}{RGB}{255, 250, 240}
        \definecolor{practicaborder}{RGB}{255, 165, 0}
        \newtcolorbox{rmdpractica}{
          colback=practicabg,
          colframe=practicaborder,
          boxrule=1pt,
          arc=3pt,
          left=6pt,
          right=6pt,
          top=6pt,
          bottom=6pt,
          title={\textbf{Práctica:}},
          fonttitle=\bfseries
        }
        
        % Entorno para información útil en LaTeX
        \definecolor{infobg}{RGB}{240, 248, 255}
        \definecolor{infoborder}{RGB}{70, 130, 180}
        \newtcolorbox{rmdinfo}{
          colback=infobg,
          colframe=infoborder,
          boxrule=1pt,
          arc=3pt,
          left=6pt,
          right=6pt,
          top=6pt,
          bottom=6pt,
          title={\textbf{Nota Informativa:}},
          fonttitle=\bfseries
        }

editor: source
